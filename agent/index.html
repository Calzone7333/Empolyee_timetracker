<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Glassmorphism Container */
        .app-container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Pulse Indicator */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
        }

        .status-running .indicator {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 1.5s infinite alternate;
        }

        .status-paused .indicator {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning);
        }

        .status-stopped .indicator {
            background: #94a3b8;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* Time Display */
        .time-display {
            font-size: 3.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .timer-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-start {
            background: var(--primary);
        }

        .btn-start:hover {
            background: var(--primary-hover);
        }

        .btn-pause {
            background: var(--warning);
        }

        .btn-pause:hover {
            background: var(--warning-hover);
        }

        .btn-stop {
            background: var(--danger);
        }

        .btn-stop:hover {
            background: var(--danger-hover);
        }

        .btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .system-info {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: left;
        }

        .info-row-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .info-row-item:last-child {
            margin-bottom: 0;
        }

        .info-value-text {
            color: #fff;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="header">
            <h1>Workspace Tracker</h1>
            <p>Monitor your active check-in time</p>
        </div>

        <div class="system-info">
            <div class="info-row-item">
                <span>Computer:</span>
                <span class="info-value-text" id="compName">Detecting...</span>
            </div>
            <div class="info-row-item">
                <span>User:</span>
                <span class="info-value-text" id="userName">Detecting...</span>
            </div>
            <div class="info-row-item">
                <span>Registration ID:</span>
                <span class="info-value-text" id="userId">#---</span>
            </div>
        </div>

        <div id="statusBadge" class="status-badge status-stopped">
            <div class="indicator"></div>
            <span id="statusText">Stopped</span>
        </div>

        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="timer-label">Tracking Duration</div>

        <div class="controls">
            <button id="btnStart" class="btn btn-start">Start</button>
            <button id="btnPause" class="btn btn-pause" disabled>Pause</button>
            <button id="btnStop" class="btn btn-stop" disabled>Stop</button>
        </div>
    </div>

    <script>
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');
        const btnStop = document.getElementById('btnStop');
        const timeDisplay = document.getElementById('timeDisplay');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');

        let isTracking = false;
        let seconds = 0;

        // Format seconds to HH:MM:SS
        function formatTime(s) {
            let hrs = Math.floor(s / 3600);
            let mins = Math.floor((s % 3600) / 60);
            let secs = s % 60;
            return [hrs, mins, secs].map(v => v.toString().padStart(2, '0')).join(':');
        }

        // Refresh UI from main process
        async function updateStatus() {
            const status = await window.api.getStatus();
            isTracking = status.isTracking;
            seconds = status.trackingSeconds;
            timeDisplay.innerText = formatTime(seconds);

            // Update System Details
            document.getElementById('compName').innerText = status.computerName || 'Local PC';
            document.getElementById('userName').innerText = status.userName || 'Unknown';
            document.getElementById('userId').innerText = status.userId ? `#${status.userId}` : 'Pending...';

            if (isTracking) {
                btnStart.disabled = true;
                btnPause.disabled = false;
                btnStop.disabled = false;

                statusBadge.className = 'status-badge status-running';
                statusText.innerText = 'Tracking Active';
            } else if (seconds > 0) {
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = false;

                statusBadge.className = 'status-badge status-paused';
                statusText.innerText = 'Paused';
            } else {
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;

                statusBadge.className = 'status-badge status-stopped';
                statusText.innerText = 'Stopped';
            }
        }

        btnStart.addEventListener('click', () => {
            window.api.startTracking();
            updateStatus();
        });

        btnPause.addEventListener('click', () => {
            window.api.pauseTracking();
            updateStatus();
        });

        btnStop.addEventListener('click', () => {
            if (confirm("Are you sure you want to stop tracking completely? This resets the timer.")) {
                window.api.stopTracking();
                updateStatus();
            }
        });

        // Tick the UI clock and sync with main every second
        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>

</html>
